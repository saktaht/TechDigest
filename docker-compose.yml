services:
  backend:
    container_name: express
    build:
      context: .
      dockerfile: backend/docker/backend/Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - db
    env_file: ./backend/.env

  db:
    container_name: db
    build:
      context: .
      dockerfile: backend/docker/db/Dockerfile
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"    

volumes:
  db-data:
