name: CI Pipeline
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  install-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend Lint
        run: npm run -w front lint

      - name: Frontend Build
        run: npm run -w front build

      - name: Generate Prisma Client
        run: npm run -w backend generate

      - name: Backend Lint
        run: npm run -w backend lint

      - name: Backend Build
        run: npm run -w backend build